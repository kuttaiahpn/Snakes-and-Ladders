<!-- Random cells for layout demonstration -->
<script>
                    const gridContainer = document.currentScript.parentElement;
                    for(let i=99; i>=1; i--) {
                        const cell = document.createElement('div');
                        const isActive = i === 64;
                        const isSnake = [98, 75, 42].includes(i);
                        const isLadder = [12, 35, 58].includes(i);
                        
                        cell.className = `relative flex items-center justify-center transition-all duration-300 border border-white/5 ${isActive ? 'bg-primary/20 shadow-[inset_0_0_15px_rgba(150,248,255,0.2)]' : 'bg-surface-container/30'}`;
                        
                        let content = `<span class="font-label text-[8px] absolute top-0.5 left-0.5 text-outline-variant/60">${i}</span>`;
                        
                        if(isActive) {
                            content += `<div class="w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_10px_#96f8ff] animate-pulse"></div>`;
                        } else if(isSnake) {
                            content += `<span class="material-symbols-outlined text-secondary-dim/40 text-xs">trending_down</span>`;
                        } else if(isLadder) {
                            content += `<span class="material-symbols-outlined text-tertiary-dim/40 text-xs">keyboard_double_arrow_up</span>`;
                        }
                        
                        cell.innerHTML = content;
                        gridContainer.appendChild(cell);
                    }
